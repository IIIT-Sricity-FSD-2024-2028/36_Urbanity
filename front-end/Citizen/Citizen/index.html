<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizens Service Portal - Dashboard</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="styles.css">
    <script src="../mockData.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">URBANITY</h1>
                <p class="sidebar-subtitle">CITIZEN PORTAL</p>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav" id="sidebarNav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="raise-issue">
                    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Raise Issue</span>
                </a>
                <a href="#" class="nav-item" data-page="my-complaints">
                    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>My Complaints</span>
                </a>
                <a href="#" class="nav-item" data-page="feedback">
                    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Feedback</span>
                </a>
                <a href="#" class="nav-item" data-page="profile">
                    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="sign-out-btn">Sign Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div>
                    <h2 class="header-title">Citizens First Service Portal</h2>
                </div>
                <div class="header-actions">
                    <div class="notification-container">
                        <button class="notification-btn" id="notificationBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                            <span class="notification-badge" id="notificationBadge">3</span>
                        </button>
                        <div class="notification-dropdown" id="notificationDropdown">
                            <div class="notification-header">
                                <h3>Notifications</h3>
                                <button class="mark-all-read" id="markAllRead">Mark all as read</button>
                            </div>
                            <div class="notification-list" id="notificationList"></div>
                            <div class="notification-footer">
                                <button class="view-all-btn">View All Notifications</button>
                            </div>
                        </div>
                    </div>
                    <div class="profile-container">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar">JD</div>
                            <div class="profile-btn-info">
                                <span class="profile-btn-name">John Doe</span>
                                <span class="profile-btn-email">citizen@urbanity.gov</span>
                            </div>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div class="profile-dropdown" id="profileDropdown">
                            <div class="profile-menu">
                                <a href="#" class="profile-menu-item" data-page="profile">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    View Profile
                                </a>
                                <a href="#" class="profile-menu-item" onclick="return false;">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                    </svg>
                                    Help &amp; Support
                                </a>
                            </div>
                            <div class="profile-dropdown-divider"></div>
                            <div class="profile-signout-wrap">
                                <button class="profile-signout-btn" type="button">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                        <polyline points="16 17 21 12 16 7"></polyline>
                                        <line x1="21" y1="12" x2="9" y2="12"></line>
                                    </svg>
                                    <span>Sign Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content" id="pageContent"></main>
        </div>
    </div>

    <!-- Issue Details Modal -->
    <div class="modal-overlay-custom" id="issueModal">
        <div class="modal-custom">
            <div class="modal-header-custom">
                <div class="modal-title-section">
                    <h2 class="modal-main-title" id="modalIssueTitle">Pothole on Main St</h2>
                    <div class="modal-badges">
                        <span class="modal-status-badge" id="modalStatusBadge">PENDING</span>
                        <span class="modal-category-text" id="modalCategoryText">#Roads</span>
                    </div>
                </div>
                <button class="modal-close-btn" onclick="closeIssueModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body-custom" id="modalBodyContent">
                <!-- Content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay edit-profile-modal" id="editProfileModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Edit Profile</h2>
                <button class="modal-close" onclick="closeEditModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="editProfileForm">
                    <div class="edit-form-group">
                        <label>Full Name</label>
                        <div class="edit-input-group">
                            <div class="edit-input-icon" style="background-color: #eff6ff;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <input type="text" id="editName" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <label>Email Address</label>
                        <div class="edit-input-group">
                            <div class="edit-input-icon" style="background-color: #f0fdf4;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <input type="email" id="editEmail" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <label>Phone Number</label>
                        <div class="edit-input-group">
                            <div class="edit-input-icon" style="background-color: #f3e8ff;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                            </div>
                            <input type="tel" id="editPhone" placeholder="Enter your phone number" required>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <label>Address</label>
                        <div class="edit-input-group">
                            <div class="edit-input-icon" style="background-color: #fef3c7;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                            </div>
                            <input type="text" id="editAddress" placeholder="Enter your address" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button modal-button-cancel" onclick="closeEditModal()">Cancel</button>
                <button type="button" class="modal-button modal-button-save" onclick="saveProfile()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
