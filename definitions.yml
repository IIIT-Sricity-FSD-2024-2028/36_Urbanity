# Domain: Smart City & Urban Services Platforms
# Problem Statement: Urban Service Request & Issue Management Platform
# Last Updated: 2026-02-02

Citizen:
  definition:
    A resident of the city who reports civic issues and requests urban services
    related to public infrastructure and municipal facilities.
  examples:
    - A resident reporting a pothole on a public road.
    - A citizen requesting repair of a malfunctioning streetlight.
  aliases:
    - Resident
    - City Resident

ServiceRequest:
  definition:
    A formal submission raised by a citizen to report an urban issue or request
    action from the municipal authorities.
  examples:
    - A request to fix a broken drainage system.
    - A complaint about uncollected garbage in a neighborhood.
  aliases:
    - Civic Request
    - Issue Request

ServiceCategory:
  definition:
    A classification that groups service requests based on the type of
    urban service or infrastructure involved.
  examples:
    - Roads and Transportation
    - Water Supply
    - Waste Management
  aliases:
    - Issue Category
    - Service Type

ServicePriority:
  definition:
    The urgency level assigned to a service request indicating how quickly
    it must be addressed based on impact and severity.
  examples:
    - High priority for a fallen electric pole.
    - Low priority for cosmetic road damage.
  aliases:
    - Priority Level
    - Urgency

ServiceStatus:
  definition:
    The current stage of a service request representing its progress
    from submission to resolution.
  examples:
    - Submitted
    - In Progress
    - Resolved
    - Closed
  aliases:
    - Request State
    - Resolution Stage

IssueSupport:
  definition:
    An action performed by a citizen to indicate agreement, concern,
    or shared impact regarding an existing service request.
  examples:
    - Multiple residents supporting a road damage complaint.
    - Citizens endorsing a garbage collection issue in their area.
  aliases:
    - Upvote
    - Issue Endorsement

DepartmentOfficer:
  definition:
    An authorized municipal official responsible for reviewing, assigning,
    and monitoring service requests within a specific department.
  examples:
    - An officer assigning a road repair request to a field worker.
    - An officer updating the status of a resolved complaint.
  aliases:
    - Municipal Officer
    - Department Staff

Assignment:
  definition:
    The act of allocating a service request to a responsible field worker
    or team for on-site action.
  examples:
    - Assigning a sanitation request to a cleaning crew.
    - Assigning a road repair request to a maintenance worker.
  aliases:
    - Task Allocation
    - Work Assignment

FieldWorker:
  definition:
    A ground-level municipal worker who physically inspects, verifies,
    and resolves assigned service requests on-site.
  examples:
    - A worker repairing a damaged streetlight.
    - A worker inspecting a water leakage complaint.
  aliases:
    - Ground Staff
    - Maintenance Worker

Verification:
  definition:
    The process of confirming the validity and severity of a service request
    through inspection or evidence before resolution begins.
  examples:
    - A field worker confirming a reported water leak.
    - An officer rejecting a duplicate complaint after verification.
  aliases:
    - Inspection
    - Validation

ResolutionReport:
  definition:
    A formal record submitted after completing work on a service request,
    describing the actions taken and outcome achieved.
  examples:
    - Report confirming pothole repair completion.
    - Report stating an issue was invalid after inspection.
  aliases:
    - Completion Report
    - Work Report

Escalation:
  definition:
    The act of forwarding a service request to higher authority when
    resolution exceeds expected time or requires special intervention.
  examples:
    - Escalating an unresolved road repair to the department head.
    - Escalating repeated complaints with high citizen support.
  aliases:
    - Issue Escalation
    - Authority Escalation

DepartmentHead:
  definition:
    The senior authority of a municipal department responsible for oversight,
    performance monitoring, and resolution escalation decisions.
  examples:
    - Reviewing delayed or highly supported service requests.
    - Approving high-priority urban issue resolutions.
  aliases:
    - Department Supervisor
    - Division Head

ServiceArea:
  definition:
    A defined geographic or administrative zone within the city used
    to organize and manage service requests.
  examples:
    - Ward 12
    - Central Business District
  aliases:
    - Ward
    - Zone

Feedback:
  definition:
    A response provided by a citizen after resolution of a service request,
    reflecting satisfaction or concerns about the service delivered.
  examples:
    - Rating streetlight repair as satisfactory.
    - Commenting on delayed waste collection.
  aliases:
    - Service Review
    - Citizen Response

SystemAdministrator:
  definition:
    An authority responsible for managing system configuration, access control,
    and overall platform governance.
  examples:
    - Managing department configurations.
    - Assigning administrative privileges.
  aliases:
    - Platform Admin
    - System Controller
